<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prometeon Industrial V27</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="authView" class="auth-wrap">
    <div class="auth-card">
      <img class="auth-top" src="top_visao.svg" alt="Prometeon" />
      <h1>Prometeon Industrial</h1>
      <div class="auth-tabs">
        <button id="tabLogin" class="active" onclick="showAuthTab('login')">Login</button>
        <button id="tabCadastro" onclick="showAuthTab('cadastro')">Cadastro</button>
      </div>
      <div id="loginPane">
        <input id="loginEmpresa" placeholder="Empresa ID" />
        <input id="loginEmail" placeholder="Email" />
        <input id="loginSenha" type="password" placeholder="Senha" />
        <button onclick="login()">Entrar</button>
      </div>
      <div id="cadastroPane" class="hidden">
        <input id="cadEmpresa" placeholder="Empresa ID" />
        <input id="cadNome" placeholder="Nome completo" />
        <input id="cadEmail" placeholder="Email" />
        <input id="cadSenha" type="password" placeholder="Senha" />
        <select id="cadRole">
          <option value="manutentor">Manutentor</option>
          <option value="gestor">Gestor</option>
          <option value="admin">Admin</option>
        </select>
        <input id="cadSetor" placeholder="Setor" />
        <input id="cadArea" placeholder="Área" />
        <button onclick="registrar()">Cadastrar usuário</button>
      </div>
      <div id="authMsg" class="muted"></div>
    </div>
  </div>

  <div id="appView" class="hidden">
    <header id="topo">
      <img id="topImage" src="top_visao.svg" alt="Topo dinâmico" />
      <div class="header-meta">
        <div>
          <strong id="empresaLabel">Empresa</strong>
          <div id="usuarioLabel" class="muted"></div>
        </div>
        <button class="small-btn" onclick="logout()">Sair</button>
      </div>
    </header>
    <main id="cardCentral"></main>
    <nav class="carousel" id="menuCarousel"></nav>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
